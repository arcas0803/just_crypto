name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-native:
    name: Rust Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy

      - name: Rust format check
        working-directory: native
        run: cargo fmt --check

      - name: Rust lint
        working-directory: native
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust build
        working-directory: native
        run: cargo build

      - name: Rust tests
        working-directory: native
        run: cargo test

  dart-package:
    name: Dart Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze .

      - name: Run tests
        run: dart test

      - name: Run example
        run: dart run example/just_crypto_example.dart

      - name: Publish dry run
        run: dart pub publish --dry-run