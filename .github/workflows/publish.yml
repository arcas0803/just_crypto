name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy

      - name: Install dependencies
        run: dart pub get

      - name: Validate Rust backend
        working-directory: native
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo build
          cargo test

      - name: Validate Dart package
        run: |
          dart analyze .
          dart test
          dart run example/just_crypto_example.dart
          dart pub publish --dry-run

      - name: Validate release artifacts
        run: |
          test -f LICENSE
          test -f CHANGELOG.md
          test -f README.md

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "Error: tag version ($TAG_VERSION) does not match pubspec version ($PUBSPEC_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Publish to pub.dev
        run: dart pub publish --force